<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kraydl Dialer – Keep Alive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    h1 { font-size: 22px; margin-bottom: 8px; color: #fff; }
    .sub { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
    .status { padding: 12px 20px; border-radius: 10px; margin-bottom: 16px; font-size: 14px; font-weight: 500; }
    .ok { background: rgba(34,197,94,0.15); color: #22c55e; }
    .err { background: rgba(239,68,68,0.15); color: #ef4444; }
    .time { color: #64748b; font-size: 12px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kraydl Dialer</h1>
    <p class="sub">Backend keep-alive monitor – pings every 5 min</p>
    <div id="status" class="status ok"><span class="dot green"></span>Checking...</div>
    <p id="time" class="time"></p>
  </div>
  <script>
    async function ping() {
      const el = document.getElementById('status');
      const timeEl = document.getElementById('time');
      try {
        const r = await fetch('/api/ping');
        const d = await r.json();
        if (d.status === 'ok') {
          el.className = 'status ok';
          el.innerHTML = '<span class="dot green"></span>Backend is alive';
        } else {
          el.className = 'status err';
          el.innerHTML = '<span class="dot red"></span>Backend error: ' + (d.error || 'unknown');
        }
        timeEl.textContent = 'Last ping: ' + new Date(d.time).toLocaleTimeString();
      } catch (e) {
        el.className = 'status err';
        el.innerHTML = '<span class="dot red"></span>Ping failed';
        timeEl.textContent = 'Error: ' + e.message;
      }
    }
    ping();
    setInterval(ping, 300000);
  </script>
</body>
</html>
